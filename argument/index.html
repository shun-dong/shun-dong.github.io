
<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>辐角定理交互演示</title>
  <style>
    .back-btn {
      position: fixed;
      top: 16px;
      left: 18px;
      z-index: 1000;
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 4px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      text-decoration: none;
    }

    .back-btn:hover {
      background: rgba(30, 64, 175, 0.95);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.5);
      transform: translateY(-1px);
    }

    .back-btn-icon {
      border-width: 0 0 2px 2px;
      border-style: solid;
      border-color: #e5e7eb;
      width: 6px;
      height: 6px;
      transform: rotate(45deg);
      margin-left: 2px;
    }
  </style>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <a class="back-btn" href="/" title="返回博客首页">
    <span class="back-btn-icon"></span>
    <span>返回博客</span>
  </a>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useRef, useState } = React;

    const TAU = 2 * Math.PI;
    const VIEW_W = 480;
    const VIEW_H = 390;

    function C(re, im = 0) {
      return { re, im };
    }

    const DEFAULT_ZEROS = [C(-1.15, 0.55), C(0.78, -0.68), C(1.2, -0.68)];
    const DEFAULT_POLES = [C(-0.35, -0.85), C(1.12, 0.58)];

    function sub(a, b) {
      return C(a.re - b.re, a.im - b.im);
    }
    function mul(a, b) {
      return C(a.re * b.re - a.im * b.im, a.re * b.im + a.im * b.re);
    }
    function div(a, b) {
      const d = b.re * b.re + b.im * b.im;
      if (d < 1e-18) {
        const direction = Math.atan2(a.im, a.re);
        return C(1e9 * Math.cos(direction), 1e9 * Math.sin(direction));
      }
      return C((a.re * b.re + a.im * b.im) / d, (a.im * b.re - a.re * b.im) / d);
    }
    function abs(a) {
      return Math.hypot(a.re, a.im);
    }
    function arg(a) {
      return Math.atan2(a.im, a.re);
    }
    function dist(a, b) {
      return Math.hypot(a.re - b.re, a.im - b.im);
    }
    function clamp(x, min, max) {
      return Math.max(min, Math.min(max, x));
    }
    function fmt(x) {
      if (!Number.isFinite(x)) return "∞";
      if (Math.abs(x) < 1e-10) return "0";
      return x.toFixed(2).replace(/[.]00$/, "");
    }
    function fmtComplex(z) {
      const re = fmt(z.re);
      const imAbs = fmt(Math.abs(z.im));
      if (Math.abs(z.im) < 1e-10) return re;
      if (Math.abs(z.re) < 1e-10) return `${z.im < 0 ? "−" : ""}${imAbs}i`;
      return `${re} ${z.im < 0 ? "−" : "+"} ${imAbs}i`;
    }
    function normalizeDelta(d) {
      while (d > Math.PI) d -= TAU;
      while (d <= -Math.PI) d += TAU;
      return d;
    }
    function clonePoints(points) {
      return points.map((p) => C(p.re, p.im));
    }

    function cExp(z) {
      const r = Math.exp(z.re);
      return C(r * Math.cos(z.im), r * Math.sin(z.im));
    }
    function cSin(z) {
      return C(Math.sin(z.re) * Math.cosh(z.im), Math.cos(z.re) * Math.sinh(z.im));
    }
    function cCos(z) {
      return C(Math.cos(z.re) * Math.cosh(z.im), -Math.sin(z.re) * Math.sinh(z.im));
    }

    function rationalMap(z, zeros, poles) {
      let numerator = C(1, 0);
      let denominator = C(1, 0);
      for (const a of zeros) numerator = mul(numerator, sub(z, a));
      for (const b of poles) denominator = mul(denominator, sub(z, b));
      return div(numerator, denominator);
    }

    function realAxisLattice(offset, minRe, maxRe) {
      const points = [];
      const kMin = Math.ceil((minRe - offset) / Math.PI) - 1;
      const kMax = Math.floor((maxRe - offset) / Math.PI) + 1;
      for (let k = kMin; k <= kMax; k++) {
        points.push(C(offset + k * Math.PI, 0));
      }
      return points;
    }

    const FUNCTION_MODES = {
      rational: {
        label: "有理函数",
        formula: "f(z)=∏(z-aᵢ)/∏(z-bⱼ)",
        description: "编辑零点与极点，观察像曲线绕原点次数。",
        eval: (z, zeros, poles) => rationalMap(z, zeros, poles),
        zeros: (_center, _radius, zeros) => zeros,
        poles: (_center, _radius, _zeros, poles) => poles,
        visibleZeros: (zeros) => zeros,
        visiblePoles: (_zeros, poles) => poles,
      },
      exp: {
        label: "exp z",
        formula: "f(z)=exp(z)",
        description: "指数函数没有零点，也没有极点；闭曲线像通常不绕过 0。",
        eval: cExp,
        zeros: () => [],
        poles: () => [],
        visibleZeros: () => [],
        visiblePoles: () => [],
      },
      sin: {
        label: "sin z",
        formula: "f(z)=sin(z)",
        description: "零点在实轴上的 kπ，圆内包含几个零点就绕 0 几圈。",
        eval: cSin,
        zeros: (center, radius) => realAxisLattice(0, center.re - radius - 0.1, center.re + radius + 0.1),
        poles: () => [],
        visibleZeros: () => realAxisLattice(0, -3.2, 3.2),
        visiblePoles: () => [],
      },
      cos: {
        label: "cos z",
        formula: "f(z)=cos(z)",
        description: "零点在实轴上的 π/2+kπ，行为与 sin z 平移后相同。",
        eval: cCos,
        zeros: (center, radius) => realAxisLattice(Math.PI / 2, center.re - radius - 0.1, center.re + radius + 0.1),
        poles: () => [],
        visibleZeros: () => realAxisLattice(Math.PI / 2, -3.2, 3.2),
        visiblePoles: () => [],
      },
      cosec: {
        label: "1/sin z",
        formula: "f(z)=1/sin(z)",
        description: "在 kπ 处有单极点；像曲线的绕数会以极点数为负贡献。",
        eval: (z) => div(C(1, 0), cSin(z)),
        zeros: () => [],
        poles: (center, radius) => realAxisLattice(0, center.re - radius - 0.1, center.re + radius + 0.1),
        visibleZeros: () => [],
        visiblePoles: () => realAxisLattice(0, -3.2, 3.2),
      },
    };

    function evalFunctionMode(mode, z, zeros, poles) {
      return FUNCTION_MODES[mode].eval(z, zeros, poles);
    }

    function sampleCircle(center, radius, n = 720) {
      const pts = [];
      for (let k = 0; k <= n; k++) {
        const t = (TAU * k) / n;
        pts.push(C(center.re + radius * Math.cos(t), center.im + radius * Math.sin(t)));
      }
      return pts;
    }

    function countInside(list, center, radius) {
      return list.filter((z) => dist(z, center) < radius - 1e-9).length;
    }
    function countNearBoundary(list, center, radius) {
      return list.filter((z) => Math.abs(dist(z, center) - radius) < 0.035).length;
    }
    function windingNumber(values) {
      let sum = 0;
      for (let i = 1; i < values.length; i++) {
        const a0 = arg(values[i - 1]);
        const a1 = arg(values[i]);
        sum += normalizeDelta(a1 - a0);
      }
      return { raw: sum / TAU, rounded: Math.round(sum / TAU), totalArg: sum };
    }

    function sortedQuantile(values, q) {
      const xs = values.filter(Number.isFinite).slice().sort((a, b) => a - b);
      if (!xs.length) return 1;
      return xs[Math.min(xs.length - 1, Math.max(0, Math.floor(q * (xs.length - 1))))];
    }

    function pathFromPoints(points, mapper, skipBad = false) {
      let path = "";
      let drawing = false;
      for (const p of points) {
        if (!Number.isFinite(p.re) || !Number.isFinite(p.im)) {
          drawing = false;
          continue;
        }
        const m = mapper(p);
        if (skipBad && (!Number.isFinite(m.x) || !Number.isFinite(m.y))) {
          drawing = false;
          continue;
        }
        path += `${drawing ? "L" : "M"}${m.x.toFixed(2)},${m.y.toFixed(2)} `;
        drawing = true;
      }
      return path;
    }

    function curveArrow(points, mapper, ratio = 0.18, skipBad = false) {
      const mapped = [];
      for (const p of points) {
        if (!Number.isFinite(p.re) || !Number.isFinite(p.im)) continue;
        const m = mapper(p);
        if (skipBad && (!Number.isFinite(m.x) || !Number.isFinite(m.y))) continue;
        mapped.push(m);
      }
      if (mapped.length < 3) return null;
      const i = clamp(Math.floor((mapped.length - 1) * ratio), 1, mapped.length - 2);
      const before = mapped[i - 1];
      const here = mapped[i];
      const after = mapped[i + 1];
      const angle = Math.atan2(after.y - before.y, after.x - before.x) * 180 / Math.PI;
      return { x: here.x, y: here.y, angle };
    }

    function CurveArrow({ arrow, className = "fill-slate-900" }) {
      if (!arrow) return null;
      return (
        <path
          d="M -11 -6 L 5 0 L -11 6 L -7 0 Z"
          className={className}
          transform={`translate(${arrow.x.toFixed(2)} ${arrow.y.toFixed(2)}) rotate(${arrow.angle.toFixed(2)})`}
        />
      );
    }

    function stereographicToSphere(w) {
      const r2 = w.re * w.re + w.im * w.im;
      if (!Number.isFinite(r2) || r2 > 1e16) return { x: 0, y: 0, z: 1 };
      return {
        x: (2 * w.re) / (r2 + 1),
        y: (2 * w.im) / (r2 + 1),
        z: (r2 - 1) / (r2 + 1),
      };
    }
    const SPHERE_CENTER = { x: 136, y: 128 };
    const SPHERE_RADIUS = 84;
    const SPHERE_PROJ_SCALE = 82;
    const SPHERE_X_AXIS = { x: 0.9, y: 0, z: 0.34 };
    const SPHERE_Y_AXIS = { x: -0.18, y: -0.95, z: 0.24 };
    const SPHERE_DEPTH_AXIS = { x: 0.323, y: -0.277, z: -0.855 };

    function sphereDepth(P) {
      return SPHERE_DEPTH_AXIS.x * P.x + SPHERE_DEPTH_AXIS.y * P.y + SPHERE_DEPTH_AXIS.z * P.z;
    }
    function projectSphere(P) {
      const x = SPHERE_CENTER.x + SPHERE_PROJ_SCALE * (SPHERE_X_AXIS.x * P.x + SPHERE_X_AXIS.z * P.z);
      const y = SPHERE_CENTER.y + SPHERE_PROJ_SCALE * (SPHERE_Y_AXIS.x * P.x + SPHERE_Y_AXIS.y * P.y + SPHERE_Y_AXIS.z * P.z);
      return { x, y };
    }

    function complexToSpherePoint(z) {
      return projectSphere(stereographicToSphere(z));
    }

    function sphereScreenToComplex(x, y) {
      const u = (x - SPHERE_CENTER.x) / SPHERE_PROJ_SCALE;
      const v = (y - SPHERE_CENTER.y) / SPHERE_PROJ_SCALE;
      const r2 = u * u + v * v;
      const scale = r2 > 1 ? 1 / Math.sqrt(r2) : 1;
      const uu = u * scale;
      const vv = v * scale;
      const depth = Math.sqrt(Math.max(0, 1 - uu * uu - vv * vv));
      const P = {
        x: uu * SPHERE_X_AXIS.x + vv * SPHERE_Y_AXIS.x + depth * SPHERE_DEPTH_AXIS.x,
        y: uu * SPHERE_X_AXIS.y + vv * SPHERE_Y_AXIS.y + depth * SPHERE_DEPTH_AXIS.y,
        z: uu * SPHERE_X_AXIS.z + vv * SPHERE_Y_AXIS.z + depth * SPHERE_DEPTH_AXIS.z,
      };
      const d = Math.max(1e-6, 1 - P.z);
      return C(P.x / d, P.y / d);
    }

    function sphereSegmentPaths(values) {
      let front = "";
      let back = "";
      let drawingFront = false;
      let drawingBack = false;

      for (const w of values) {
        const S = stereographicToSphere(w);
        const p = projectSphere(S);
        const isFront = sphereDepth(S) >= 0;
        if (isFront) {
          front += `${drawingFront ? "L" : "M"}${p.x.toFixed(2)},${p.y.toFixed(2)} `;
          drawingFront = true;
          drawingBack = false;
        } else {
          back += `${drawingBack ? "L" : "M"}${p.x.toFixed(2)},${p.y.toFixed(2)} `;
          drawingBack = true;
          drawingFront = false;
        }
      }

      return { front, back };
    }

    function planeGrid({ xMin, xMax, yMin, yMax, step = 1, map }) {
      const lines = [];
      for (let x = Math.ceil(xMin); x <= Math.floor(xMax); x += step) {
        const p1 = map(C(x, yMin));
        const p2 = map(C(x, yMax));
        lines.push(<line key={`vx${x}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} className="stroke-slate-200" strokeWidth="1" />);
      }
      for (let y = Math.ceil(yMin); y <= Math.floor(yMax); y += step) {
        const p1 = map(C(xMin, y));
        const p2 = map(C(xMax, y));
        lines.push(<line key={`hy${y}`} x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} className="stroke-slate-200" strokeWidth="1" />);
      }
      return lines;
    }

    function NumberInput({ value, onChange }) {
      return (
        <input
          type="number"
          step="0.01"
          value={Number.isFinite(value) ? value : 0}
          onChange={(e) => onChange(Number(e.target.value))}
          className="w-full rounded-lg border border-slate-300 bg-white px-2 py-1 font-mono text-xs outline-none transition focus:border-slate-900 focus:ring-2 focus:ring-slate-200"
        />
      );
    }

    function PresetButton({ children, onClick }) {
      return (
        <button
          onClick={onClick}
          className="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm transition hover:-translate-y-0.5 hover:bg-slate-50 hover:shadow"
        >
          {children}
        </button>
      );
    }

    function FunctionModeButton({ active, children, onClick }) {
      return (
        <button
          onClick={onClick}
          className={`rounded-xl px-3 py-2 text-sm transition ${active
            ? "bg-slate-900 text-white shadow-sm"
            : "border border-slate-200 bg-white text-slate-700 shadow-sm hover:bg-slate-50"
            }`}
        >
          {children}
        </button>
      );
    }

    function PointEditor({ title, points, setPoints, prefix, accentClass, kind }) {
      function updatePoint(index, key, value) {
        setPoints((prev) => prev.map((p, i) => (i === index ? C(key === "re" ? value : p.re, key === "im" ? value : p.im) : p)));
      }
      function addPoint() {
        setPoints((prev) => {
          const offset = 0.18 * prev.length;
          return [...prev, C(clamp(offset, -1.6, 1.6), kind === "zero" ? 0.35 : -0.35)];
        });
      }
      function removePoint(index) {
        setPoints((prev) => prev.filter((_, i) => i !== index));
      }

      return (
        <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <div className="mb-3 flex items-center justify-between gap-2">
            <h3 className="text-sm font-semibold text-slate-800">{title}</h3>
            <button onClick={addPoint} className="rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs text-slate-700 hover:bg-slate-100">
              + 添加
            </button>
          </div>
          <div className="max-h-80 space-y-3 overflow-auto pr-1">
            {points.length === 0 ? (
              <div className="rounded-xl bg-white p-3 text-sm text-slate-500">当前没有{title.replace("设置", "")}。</div>
            ) : (
              points.map((p, i) => (
                <div key={`${kind}-${i}`} className="rounded-xl bg-white p-3 shadow-sm ring-1 ring-slate-100">
                  <div className="mb-2 flex items-center justify-between">
                    <div className={`text-sm font-semibold ${accentClass}`}>{prefix}{i + 1}</div>
                    <button onClick={() => removePoint(i)} className="rounded-md px-2 py-1 text-xs text-rose-600 hover:bg-rose-50">
                      删除
                    </button>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <label className="grid gap-1 text-xs text-slate-600">
                      <span>实部</span>
                      <NumberInput value={p.re} onChange={(v) => updatePoint(i, "re", v)} />
                    </label>
                    <label className="grid gap-1 text-xs text-slate-600">
                      <span>虚部</span>
                      <NumberInput value={p.im} onChange={(v) => updatePoint(i, "im", v)} />
                    </label>
                  </div>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    function ArgumentPrincipleRationalMapDemo() {
      const [center, setCenter] = useState(C(0, 0));
      const [radius, setRadius] = useState(1.05);
      const [zeros, setZeros] = useState(() => clonePoints(DEFAULT_ZEROS));
      const [poles, setPoles] = useState(() => clonePoints(DEFAULT_POLES));
      const [functionMode, setFunctionMode] = useState("rational");
      const [dragTarget, setDragTarget] = useState(null);
      const inputPlaneRef = useRef(null);
      const inputSphereRef = useRef(null);
      const functionSpec = FUNCTION_MODES[functionMode];

      const data = useMemo(() => {
        const zPts = sampleCircle(center, radius, 900);
        const wPts = zPts.map((z) => evalFunctionMode(functionMode, z, zeros, poles));
        const activeZeros = functionSpec.zeros(center, radius, zeros, poles);
        const activePoles = functionSpec.poles(center, radius, zeros, poles);
        const visibleZeros = functionSpec.visibleZeros(zeros, poles);
        const visiblePoles = functionSpec.visiblePoles(zeros, poles);
        const zeroIn = countInside(activeZeros, center, radius);
        const poleIn = countInside(activePoles, center, radius);
        const nearZero = countNearBoundary(activeZeros, center, radius);
        const nearPole = countNearBoundary(activePoles, center, radius);
        const winding = windingNumber(wPts);
        const magnitudes = wPts.map(abs).filter((x) => Number.isFinite(x));
        const q90 = Math.max(1.2, sortedQuantile(magnitudes, 0.9));
        return { zPts, wPts, activeZeros, activePoles, visibleZeros, visiblePoles, zeroIn, poleIn, nearZero, nearPole, winding, q90 };
      }, [center, radius, zeros, poles, functionMode, functionSpec]);

      const predicted = data.zeroIn - data.poleIn;
      const isRationalMode = functionMode === "rational";

      const zFramePoints = [center, ...data.visibleZeros, ...data.visiblePoles];
      const zHalfWidth = Math.max(2.25, Math.abs(center.re) + radius, ...zFramePoints.map((z) => Math.abs(z.re) + 0.35));
      const zHalfHeight = Math.max(1.75, Math.abs(center.im) + radius, ...zFramePoints.map((z) => Math.abs(z.im) + 0.35));
      const zScale = Math.min((VIEW_W / 2 - 28) / zHalfWidth, (VIEW_H / 2 - 28) / zHalfHeight);
      const zGrid = {
        xMin: Math.floor(-VIEW_W / 2 / zScale),
        xMax: Math.ceil(VIEW_W / 2 / zScale),
        yMin: Math.floor(-VIEW_H / 2 / zScale),
        yMax: Math.ceil(VIEW_H / 2 / zScale),
      };
      const zMap = (z) => ({ x: VIEW_W / 2 + zScale * z.re, y: VIEW_H / 2 - zScale * z.im });
      const zUnmap = (x, y) => C((x - VIEW_W / 2) / zScale, (VIEW_H / 2 - y) / zScale);
      const wScale = 118 / data.q90;
      const wMap = (w) => ({
        x: VIEW_W / 2 + wScale * clamp(w.re, -7, 7),
        y: VIEW_H / 2 - wScale * clamp(w.im, -7, 7),
      });
      const centerImage = evalFunctionMode(functionMode, center, zeros, poles);
      const centerImageScreen = wMap(centerImage);
      const centerImageSphere = complexToSpherePoint(centerImage);
      const spherePaths = sphereSegmentPaths(data.wPts);
      const zSpherePaths = sphereSegmentPaths(data.zPts);
      const zCirclePath = pathFromPoints(data.zPts, zMap);
      const wImagePath = pathFromPoints(data.wPts, wMap, true);
      const zArrow = curveArrow(data.zPts, zMap, 0.12);
      const zSphereArrow = curveArrow(data.zPts, complexToSpherePoint, 0.12, true);
      const wArrow = curveArrow(data.wPts, wMap, 0.18, true);
      const sphereArrow = curveArrow(data.wPts, (w) => projectSphere(stereographicToSphere(w)), 0.18, true);

      function pointerToComplex(e, surface) {
        const ref = surface === "sphere" ? inputSphereRef : inputPlaneRef;
        const rect = ref.current.getBoundingClientRect();
        if (surface === "sphere") {
          const x = ((e.clientX - rect.left) / rect.width) * 272;
          const y = ((e.clientY - rect.top) / rect.height) * 256;
          return sphereScreenToComplex(x, y);
        }
        const x = ((e.clientX - rect.left) / rect.width) * VIEW_W;
        const y = ((e.clientY - rect.top) / rect.height) * VIEW_H;
        return zUnmap(x, y);
      }

      function onPointerMove(e) {
        if (!dragTarget) return;
        const z = pointerToComplex(e, dragTarget.surface);
        const clipped = C(clamp(z.re, -8, 8), clamp(z.im, -8, 8));

        if (dragTarget.type === "center") {
          setCenter(clipped);
        } else if (dragTarget.type === "zero") {
          setZeros((prev) => prev.map((p, i) => (i === dragTarget.index ? clipped : p)));
        } else if (dragTarget.type === "pole") {
          setPoles((prev) => prev.map((p, i) => (i === dragTarget.index ? clipped : p)));
        }
      }

      function stopDragging() {
        setDragTarget(null);
      }

      function resetAll() {
        setZeros(clonePoints(DEFAULT_ZEROS));
        setPoles(clonePoints(DEFAULT_POLES));
        setCenter(C(0, 0));
        setRadius(1.05);
      }

      function randomizePoints() {
        const rand = () => C(Number((Math.random() * 3.0 - 1.5).toFixed(2)), Number((Math.random() * 2.2 - 1.1).toFixed(2)));
        setZeros(Array.from({ length: Math.max(1, zeros.length) }, rand));
        setPoles(Array.from({ length: Math.max(1, poles.length) }, rand));
      }

      const centerScreen = zMap(center);
      const centerSphere = complexToSpherePoint(center);
      const zeroColor = "fill-emerald-500 stroke-emerald-800";
      const poleColor = "stroke-rose-600";

      const controlPanel = (
        <div className="mt-5 rounded-2xl bg-slate-50 p-4">
          <div className="flex items-center justify-between gap-3">
            <h2 className="text-lg font-semibold">控制、编辑与读数</h2>
            <div className="flex flex-wrap gap-2">
              <button onClick={resetAll} className="rounded-xl bg-slate-900 px-3 py-2 text-sm text-white shadow-sm hover:bg-slate-700">重置</button>
              {isRationalMode && (
                <button onClick={randomizePoints} className="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 shadow-sm hover:bg-slate-50">随机点位</button>
              )}
            </div>
          </div>

          <div className="mt-3 flex flex-wrap gap-2 text-sm">
            <div className="rounded-xl bg-white px-3 py-2 shadow-sm">零点 <span className="font-semibold text-emerald-600">{data.zeroIn}</span></div>
            <div className="rounded-xl bg-white px-3 py-2 shadow-sm">极点 <span className="font-semibold text-rose-600">{data.poleIn}</span></div>
            <div className="rounded-xl bg-white px-3 py-2 shadow-sm">N − P <span className="font-semibold">{predicted}</span></div>
            <div className="rounded-xl bg-blue-50 px-3 py-2 text-blue-800">wind <span className="font-semibold">{data.winding.raw.toFixed(3)} → {data.winding.rounded}</span></div>
          </div>

          <div className="mt-4 grid gap-4">
            <div>
              <div className="text-sm font-medium text-slate-600">函数预设</div>
              <div className="mt-2 flex flex-wrap gap-2">
                {Object.entries(FUNCTION_MODES).map(([key, spec]) => (
                  <FunctionModeButton key={key} active={functionMode === key} onClick={() => setFunctionMode(key)}>
                    {spec.label}
                  </FunctionModeButton>
                ))}
              </div>
              <div className="mt-4 grid gap-3 md:grid-cols-3">
                <label className="grid gap-1 text-xs text-slate-600">
                  <span>圆心 Re(c)</span>
                  <NumberInput value={center.re} onChange={(v) => setCenter(C(v, center.im))} />
                </label>
                <label className="grid gap-1 text-xs text-slate-600">
                  <span>圆心 Im(c)</span>
                  <NumberInput value={center.im} onChange={(v) => setCenter(C(center.re, v))} />
                </label>
                <label className="grid gap-1 text-xs text-slate-600">
                  <span>半径 r</span>
                  <NumberInput value={radius} onChange={(v) => setRadius(Math.max(0.01, v))} />
                </label>
              </div>
              {isRationalMode && (
                <div className="mt-4 flex flex-wrap gap-2">
                  <PresetButton onClick={() => { setCenter(zeros[0] ?? C(0, 0)); setRadius(0.42); }}>围住 a₁</PresetButton>
                  <PresetButton onClick={() => { setCenter(C(-0.7, -0.15)); setRadius(0.95); }}>示例：零点与极点抵消</PresetButton>
                  <PresetButton onClick={() => { setCenter(C(0.1, -0.05)); setRadius(1.55); }}>示例：多个奇点</PresetButton>
                  <PresetButton onClick={() => { setCenter(C(0, 0)); setRadius(2.05); }}>大圆：看总次数</PresetButton>
                </div>
              )}
            </div>
          </div>

          {isRationalMode && (
            <div className="mt-5 grid gap-4 lg:grid-cols-2">
              <PointEditor title="零点设置" points={zeros} setPoints={setZeros} prefix="a" accentClass="text-emerald-700" kind="zero" />
              <PointEditor title="极点设置" points={poles} setPoints={setPoles} prefix="b" accentClass="text-rose-700" kind="pole" />
            </div>
          )}
        </div>
      );

      return (
        <div className="min-h-screen bg-slate-50 p-4 text-slate-900 md:p-6">
          <div className="mx-auto max-w-7xl space-y-4">
            <header className="rounded-3xl bg-white p-5 shadow-sm ring-1 ring-slate-200">
              <div className="flex flex-col gap-3">
                <div>
                  <p className="text-sm font-medium uppercase tracking-[0.22em] text-slate-500">Complex analysis demo</p>
                  <h1 className="mt-1 text-2xl font-semibold tracking-tight md:text-3xl">辐角定理交互演示</h1>
                </div>
              </div>
              {controlPanel}
            </header>

            <main className="grid gap-4 lg:grid-cols-[1.05fr_1fr]">
              <section className="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
                <div className="mb-3 flex items-center justify-between gap-3">
                  <div>
                    <h2 className="text-lg font-semibold">输入复平面：移动的闭圆 γ</h2>
                    <p className="text-sm text-slate-500">
                      绿色点是零点，红色叉是极点；{isRationalMode ? "三类对象都可在图中拖动。" : "当前预设函数的零点/极点位置会自动标出。"}
                    </p>
                  </div>
                  <div className="rounded-full bg-slate-100 px-3 py-1 text-xs text-slate-600">
                    {isRationalMode ? "拖动圆心 / 零点 / 极点" : "拖动圆心，观察穿过零点/极点时的跳变"}
                  </div>
                </div>
                <svg
                  ref={inputPlaneRef}
                  viewBox={`0 0 ${VIEW_W} ${VIEW_H}`}
                  className="h-[390px] w-full touch-none cursor-crosshair rounded-2xl border border-slate-200 bg-white"
                  onPointerMove={onPointerMove}
                  onPointerUp={stopDragging}
                  onPointerLeave={stopDragging}
                >
                  <rect x="0" y="0" width={VIEW_W} height={VIEW_H} fill="white" />
                  {planeGrid({ xMin: zGrid.xMin, xMax: zGrid.xMax, yMin: zGrid.yMin, yMax: zGrid.yMax, map: zMap })}
                  <line x1="0" y1={VIEW_H / 2} x2={VIEW_W} y2={VIEW_H / 2} className="stroke-slate-300" strokeWidth="1.5" />
                  <line x1={VIEW_W / 2} y1="0" x2={VIEW_W / 2} y2={VIEW_H} className="stroke-slate-300" strokeWidth="1.5" />
                  <path d={zCirclePath} fill="none" className="stroke-slate-900" strokeWidth="3" />
                  <CurveArrow arrow={zArrow} />
                  <circle cx={centerScreen.x + radius * zScale} cy={centerScreen.y} r="4" fill="#0f172a" opacity="0.8" />

                  {data.visibleZeros.map((z, i) => {
                    const p = zMap(z);
                    return (
                      <g
                        key={`z${i}`}
                        onPointerDown={(e) => {
                          if (!isRationalMode) return;
                          e.stopPropagation();
                          e.currentTarget.setPointerCapture(e.pointerId);
                          setDragTarget({ type: "zero", index: i, surface: "plane" });
                        }}
                        className={isRationalMode ? "cursor-move" : ""}
                      >
                        <circle cx={p.x} cy={p.y} r="9" fill="rgba(16,185,129,0.13)" />
                        <circle cx={p.x} cy={p.y} r="7" className={zeroColor} strokeWidth="2" />
                        <text x={p.x + 10} y={p.y - 9} className="select-none fill-emerald-700 text-xs font-semibold">{isRationalMode ? `a${i + 1}` : "0"}</text>
                      </g>
                    );
                  })}

                  {data.visiblePoles.map((z, i) => {
                    const p = zMap(z);
                    return (
                      <g
                        key={`p${i}`}
                        onPointerDown={(e) => {
                          if (!isRationalMode) return;
                          e.stopPropagation();
                          e.currentTarget.setPointerCapture(e.pointerId);
                          setDragTarget({ type: "pole", index: i, surface: "plane" });
                        }}
                        className={isRationalMode ? "cursor-move" : ""}
                      >
                        <circle cx={p.x} cy={p.y} r="11" fill="rgba(244,63,94,0.10)" />
                        <line x1={p.x - 8} y1={p.y - 8} x2={p.x + 8} y2={p.y + 8} className={poleColor} strokeWidth="3" strokeLinecap="round" />
                        <line x1={p.x + 8} y1={p.y - 8} x2={p.x - 8} y2={p.y + 8} className={poleColor} strokeWidth="3" strokeLinecap="round" />
                        <text x={p.x + 11} y={p.y - 9} className="select-none fill-rose-700 text-xs font-semibold">{isRationalMode ? `b${i + 1}` : "∞"}</text>
                      </g>
                    );
                  })}

                  <g
                    onPointerDown={(e) => {
                      e.currentTarget.setPointerCapture(e.pointerId);
                      setDragTarget({ type: "center", surface: "plane" });
                    }}
                    className="cursor-grab active:cursor-grabbing"
                  >
                    <circle cx={centerScreen.x} cy={centerScreen.y} r="15" fill="rgba(15,23,42,0.10)" />
                    <circle cx={centerScreen.x} cy={centerScreen.y} r="5" fill="#0f172a" />
                  </g>
                </svg>
              </section>

              <section className="grid gap-4">
                <div className="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
                  <div className="mb-3 flex items-center justify-between gap-3">
                    <div>
                      <h2 className="text-lg font-semibold">输出复平面：像曲线 f(γ)</h2>
                      <p className="text-sm text-slate-500">蓝色闭曲线绕原点的次数就是 Δarg f(z)/(2π)。</p>
                    </div>
                    <div className="rounded-full bg-blue-50 px-3 py-1 text-xs font-medium text-blue-700">
                      wind ≈ {data.winding.raw.toFixed(3)} → {data.winding.rounded}
                    </div>
                  </div>
                  <svg viewBox={`0 0 ${VIEW_W} ${VIEW_H}`} className="h-[300px] w-full rounded-2xl border border-slate-200 bg-white md:h-[390px]">
                    <rect x="0" y="0" width={VIEW_W} height={VIEW_H} fill="white" />
                    {planeGrid({ xMin: -3, xMax: 3, yMin: -2.5, yMax: 2.5, map: wMap })}
                    <line x1="0" y1={VIEW_H / 2} x2={VIEW_W} y2={VIEW_H / 2} className="stroke-slate-300" strokeWidth="1.5" />
                    <line x1={VIEW_W / 2} y1="0" x2={VIEW_W / 2} y2={VIEW_H} className="stroke-slate-300" strokeWidth="1.5" />
                    <circle cx={VIEW_W / 2} cy={VIEW_H / 2} r="6" fill="#0f172a" />
                    <text x="251" y="190" className="fill-slate-700 text-xs font-semibold">0</text>
                    <path d={wImagePath} fill="none" stroke="#2563eb" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                    <CurveArrow arrow={wArrow} className="fill-blue-600" />
                    {Number.isFinite(centerImage.re) && Number.isFinite(centerImage.im) && (
                      <g>
                        <circle cx={centerImageScreen.x} cy={centerImageScreen.y} r="14" fill="rgba(245,158,11,0.16)" />
                        <circle cx={centerImageScreen.x} cy={centerImageScreen.y} r="6" fill="#f59e0b" stroke="#92400e" strokeWidth="2" />
                        <text x={centerImageScreen.x + 10} y={centerImageScreen.y - 10} className="fill-amber-700 text-xs font-semibold">f(c)</text>
                      </g>
                    )}
                    <circle cx={VIEW_W / 2} cy={VIEW_H / 2} r="38" fill="none" stroke="#94a3b8" strokeDasharray="4 5" />
                    <text x="16" y="28" className="fill-slate-500 text-xs">自动缩放：大值会被压到画面边缘；看黎曼球可理解趋近无穷远的部分。</text>
                  </svg>
                </div>
              </section>
            </main>

            <section className="grid gap-4 lg:grid-cols-2">
              <div className="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
                <div className="mb-3 flex items-center justify-between gap-3">
                  <div>
                    <h2 className="text-lg font-semibold">输入黎曼球面：同一个 γ</h2>
                    <p className="text-sm text-slate-500">这里显示输入 z 的黎曼球面；可直接拖动圆心{isRationalMode ? "、零点、极点" : ""}。</p>
                  </div>
                  <div className="rounded-full bg-slate-100 px-3 py-1 text-xs text-slate-600">背面为虚线</div>
                </div>
                <svg
                  ref={inputSphereRef}
                  viewBox="0 0 272 256"
                  className="h-72 w-full touch-none cursor-crosshair rounded-2xl border border-slate-200 bg-gradient-to-br from-white to-slate-50 md:h-[390px]"
                  onPointerMove={onPointerMove}
                  onPointerUp={stopDragging}
                  onPointerLeave={stopDragging}
                >
                  <circle cx="136" cy="128" r="84" fill="white" stroke="#cbd5e1" strokeWidth="2" />
                  <ellipse cx="136" cy="128" rx="84" ry="21" fill="none" stroke="#e2e8f0" strokeWidth="1.5" />
                  <ellipse cx="136" cy="128" rx="40" ry="84" fill="none" stroke="#e2e8f0" strokeWidth="1.5" transform="rotate(18 136 128)" />
                  <ellipse cx="136" cy="128" rx="40" ry="84" fill="none" stroke="#e2e8f0" strokeWidth="1.5" transform="rotate(-28 136 128)" />
                  <circle cx="136" cy="45" r="4" fill="#f43f5e" />
                  <text x="145" y="48" className="fill-rose-600 text-xs font-semibold">∞</text>
                  <circle cx="136" cy="128" r="3.5" fill="#0f172a" />
                  <text x="145" y="126" className="fill-slate-700 text-xs font-semibold">0</text>
                  <path d={zSpherePaths.back} fill="none" stroke="#0f172a" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="5 6" opacity="0.55" />
                  <path d={zSpherePaths.front} fill="none" stroke="#0f172a" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                  <CurveArrow arrow={zSphereArrow} />

                  {data.visibleZeros.map((z, i) => {
                    const p = complexToSpherePoint(z);
                    return (
                      <g
                        key={`sz${i}`}
                        onPointerDown={(e) => {
                          if (!isRationalMode) return;
                          e.stopPropagation();
                          e.currentTarget.setPointerCapture(e.pointerId);
                          setDragTarget({ type: "zero", index: i, surface: "sphere" });
                        }}
                        className={isRationalMode ? "cursor-move" : ""}
                      >
                        <circle cx={p.x} cy={p.y} r="9" fill="rgba(16,185,129,0.13)" />
                        <circle cx={p.x} cy={p.y} r="7" className={zeroColor} strokeWidth="2" />
                        <text x={p.x + 10} y={p.y - 9} className="select-none fill-emerald-700 text-xs font-semibold">{isRationalMode ? `a${i + 1}` : "0"}</text>
                      </g>
                    );
                  })}

                  {data.visiblePoles.map((z, i) => {
                    const p = complexToSpherePoint(z);
                    return (
                      <g
                        key={`sp${i}`}
                        onPointerDown={(e) => {
                          if (!isRationalMode) return;
                          e.stopPropagation();
                          e.currentTarget.setPointerCapture(e.pointerId);
                          setDragTarget({ type: "pole", index: i, surface: "sphere" });
                        }}
                        className={isRationalMode ? "cursor-move" : ""}
                      >
                        <circle cx={p.x} cy={p.y} r="11" fill="rgba(244,63,94,0.10)" />
                        <line x1={p.x - 8} y1={p.y - 8} x2={p.x + 8} y2={p.y + 8} className={poleColor} strokeWidth="3" strokeLinecap="round" />
                        <line x1={p.x + 8} y1={p.y - 8} x2={p.x - 8} y2={p.y + 8} className={poleColor} strokeWidth="3" strokeLinecap="round" />
                        <text x={p.x + 11} y={p.y - 9} className="select-none fill-rose-700 text-xs font-semibold">{isRationalMode ? `b${i + 1}` : "∞"}</text>
                      </g>
                    );
                  })}

                  <g
                    onPointerDown={(e) => {
                      e.currentTarget.setPointerCapture(e.pointerId);
                      setDragTarget({ type: "center", surface: "sphere" });
                    }}
                    className="cursor-grab active:cursor-grabbing"
                  >
                    <circle cx={centerSphere.x} cy={centerSphere.y} r="15" fill="rgba(15,23,42,0.10)" />
                    <circle cx={centerSphere.x} cy={centerSphere.y} r="5" fill="#0f172a" />
                  </g>
                </svg>
              </div>

              <div className="rounded-3xl bg-white p-4 shadow-sm ring-1 ring-slate-200">
                <div className="mb-3 flex items-center justify-between gap-3">
                  <div>
                    <h2 className="text-lg font-semibold">输出黎曼球面：f(γ)</h2>
                    <p className="text-sm text-slate-500">输出 w=f(z) 的黎曼球投影；远离原点的部分会靠近无穷远点。</p>
                  </div>
                  <div className="rounded-full bg-blue-50 px-3 py-1 text-xs font-medium text-blue-700">背面为虚线</div>
                </div>
                <svg viewBox="0 0 272 256" className="h-72 w-full rounded-2xl border border-slate-200 bg-gradient-to-br from-white to-slate-50 md:h-[390px]">
                  <circle cx="136" cy="128" r="84" fill="white" stroke="#cbd5e1" strokeWidth="2" />
                  <ellipse cx="136" cy="128" rx="84" ry="21" fill="none" stroke="#e2e8f0" strokeWidth="1.5" />
                  <ellipse cx="136" cy="128" rx="40" ry="84" fill="none" stroke="#e2e8f0" strokeWidth="1.5" transform="rotate(18 136 128)" />
                  <ellipse cx="136" cy="128" rx="40" ry="84" fill="none" stroke="#e2e8f0" strokeWidth="1.5" transform="rotate(-28 136 128)" />
                  <circle cx="136" cy="45" r="4" fill="#f43f5e" />
                  <text x="145" y="48" className="fill-rose-600 text-xs font-semibold">∞</text>
                  <circle cx="136" cy="128" r="3.5" fill="#0f172a" />
                  <text x="145" y="126" className="fill-slate-700 text-xs font-semibold">0</text>
                  <path d={spherePaths.back} fill="none" stroke="#2563eb" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="5 6" opacity="0.7" />
                  <path d={spherePaths.front} fill="none" stroke="#2563eb" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                  <CurveArrow arrow={sphereArrow} className="fill-blue-600" />
                  <g>
                    <circle cx={centerImageSphere.x} cy={centerImageSphere.y} r="14" fill="rgba(245,158,11,0.16)" />
                    <circle cx={centerImageSphere.x} cy={centerImageSphere.y} r="6" fill="#f59e0b" stroke="#92400e" strokeWidth="2" />
                    <text x={centerImageSphere.x + 10} y={centerImageSphere.y - 10} className="fill-amber-700 text-xs font-semibold">f(c)</text>
                  </g>
                </svg>
              </div>
            </section>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ArgumentPrincipleRationalMapDemo />);
  </script>
</body>

</html>
